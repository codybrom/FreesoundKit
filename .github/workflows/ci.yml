name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  swift-package:
    name: Swift Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-26]
    steps:
      - uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build --build-tests

      - name: Test
        run: swift test --parallel --enable-code-coverage

  linux:
    name: Swift Package (Linux, Swift ${{ matrix.swift }})
    runs-on: ubuntu-latest
    container: swift:${{ matrix.swift }}
    # 6.2 is advisory: it exercises the `#if compiler(<6.2)` path in
    # FreesoundClient.swift where the retroactive URLSession Sendable conformance
    # is dropped. Don't block merges on it until that toolchain's
    # corelibs-foundation behavior is confirmed.
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        swift: ["6.1"]
        include:
          - swift: "6.2"
            experimental: true
    steps:
      - uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build --build-tests

      - name: Test
        run: swift test --parallel

  android:
    name: Swift Package (Android)
    runs-on: ubuntu-latest
    # Cross-compiles for Android (build only, no emulator). Advisory until the
    # first run is green — drop continue-on-error to make it required.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: skiptools/swift-android-action@v2
        with:
          swift-version: "6.3"
          run-tests: false
